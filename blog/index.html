title: Blog
---

<h1>My Blog</h1>
<p style="color: #b0b0b0; margin-bottom: 2rem;">Thoughts and ideas on development, creativity, and whatever else is on my mind.</p>

<div id="blog-container">
    <!-- Blog entries will be loaded here -->
</div>

<form id="blog-form">
    <h3>Share a Thought</h3>

    <label for="entry-title">Title:</label>
    <input type="text" id="entry-title" placeholder="What's on your mind?" required>

    <label for="entry-category">Category:</label>
    <select id="entry-category" required>
        <option value="">Select a category</option>
        <option value="Development">Development</option>
        <option value="Design">Design</option>
        <option value="Life">Life</option>
        <option value="Other">Other</option>
    </select>

    <label for="entry-content">Content:</label>
    <textarea id="entry-content" placeholder="Share your thoughts..." required></textarea>

    <button type="submit">Post Entry</button>
</form>

<script src="{{ '/assets/js/blog.js' | relative_url }}"></script>
