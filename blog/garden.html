<h1>Garden Tracker</h1>
<div id="garden-container">
    <!-- Garden entries will be displayed here -->
</div>

<h2>Add New Entry</h2>
<form id="garden-form">
    <label for="plant-name">Plant Name:</label>
    <input type="text" id="plant-name" required>
    <label for="date-planted">Date Planted:</label>
    <input type="date" id="date-planted" required>
    <label for="notes">Notes:</label>
    <textarea id="notes"></textarea>
    <button type="submit">Add Entry</button>
</form>

<script src="{{ '/assets/js/garden.js' | relative_url }}"></script>
